<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./css/style.css" rel="stylesheet">
	<title>Library</title>
</head>
<body>
	<div class="container">

		<div class="header">
			<div class="title">
				<p id="titleText">Library</p>
				<p id="titleCopy">Tracking my readings</p>
			</div>
			<button id="newBookBtn">+ New Book</button>
		</div>

		<div class="metrics">
			<div class="total">
				<p class="metricTitle">Total</p>
				<p class="metricValue">0</p>
			</div>
			<div class="read">
				<p class="metricTitle">Read</p>
				<p class="metricValue">0</p>
			</div>
			<div class="pending">
				<p class="metricTitle">Pending</p>
				<p class="metricValue">0</p>
			</div>
		</div>

		<div class="booksList">

		</div>

	</div>
</body>
</html>
