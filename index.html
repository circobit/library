<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./css/style.css" rel="stylesheet">
	<script src="./js/script.js" defer></script>
	<title>Library</title>
</head>
<body>
	<div class="container">

		<div class="header">
			<div class="title">
				<p id="titleText">Library</p>
				<p id="titleCopy">Tracking my readings</p>
			</div>
			<button id="newBookBtn" popovertarget="newBookPopover" onclick="newBookPopover.showModal()">+ New Book</button>
		</div>

		<dialog id="newBookPopover" popover>
			<div class="formTitleAndCloseButton">
				<p id="formTitle"></p>
				<button popovertarget="newBookPopover" popovertargetaction="hide" onclick="newBookPopover.close()">Close</button>
			</div>
			<form method="dialog">
				<div class="inputPair">
					<label for="bookTitle">Book Title:</label>
					<input type="text" id="bookTitle" name="bookTitle" placeholder="Bad Girls" required>
				</div>
				<div class="inputPair">
					<label for="firstName">Author name:</label>
					<input type="text" id="firstName" name="firstName" placeholder="Camila" required>
				</div>
				<div class="inputPair">
					<label for="lastName">Author lastname:</label>
					<input type="text" id="lastName" name="lastName" placeholder="Sosa Villada" required>
				</div>
				<div class="inputPair">
					<label for="pages">Pages:</label>
					<input type="text" id="pages" name="pages" placeholder="317" required>
				</div>
				<div class="inputPair">
					<label for="isRead">Is it read?</label>
					<select name="isRead" id="isRead" required>
						<option value="">Please pick an option</option>
						<option value=true>Read</option>
						<option value=false>Pending</option>
					</select>
				</div>
				<button id="addBookBtn">Add Book</button>
			</form>
		</dialog>

		<div class="metrics">
			<div class="total">
				<p class="metricTitle">Total</p>
				<p id="totalMetricValue" class="metricValue">0</p>
			</div>
			<div class="read">
				<p class="metricTitle">Read</p>
				<p id="readMetricValue" class="metricValue">0</p>
			</div>
			<div class="pending">
				<p class="metricTitle">Pending</p>
				<p id="pendingMetricValue" class="metricValue">0</p>
			</div>
		</div>

		<div id="booksList">

		</div>

	</div>
</body>
</html>
